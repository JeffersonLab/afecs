# Prometheus configuration for AFECS monitoring
# Copy this file to your Prometheus configuration directory
# and modify the targets to match your deployment

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'jlab-daq'
    environment: 'production'

# Load alerting rules
rule_files:
  - 'afecs_alerts.yml'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - 'alertmanager:9093'

# Scrape configurations
scrape_configs:
  # AFECS Supervisor metrics
  - job_name: 'afecs-supervisor'
    scrape_interval: 15s
    scrape_timeout: 10s

    static_configs:
      # Single supervisor example
      - targets: ['localhost:9090']
        labels:
          instance: 'supervisor1'
          facility: 'hallb'

      # Multiple supervisors example
      # - targets:
      #   - 'supervisor1.jlab.org:9090'
      #   - 'supervisor2.jlab.org:9091'
      #   - 'supervisor3.jlab.org:9092'

    # Metric relabeling
    metric_relabel_configs:
      # Drop JVM metrics if not needed (reduces cardinality)
      # - source_labels: [__name__]
      #   regex: 'jvm_.*'
      #   action: drop

  # Node exporter for system metrics (optional)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

# Remote write configuration (optional - for long-term storage)
# remote_write:
#   - url: 'http://prometheus-remote-storage:9201/write'

# Remote read configuration (optional)
# remote_read:
#   - url: 'http://prometheus-remote-storage:9201/read'
